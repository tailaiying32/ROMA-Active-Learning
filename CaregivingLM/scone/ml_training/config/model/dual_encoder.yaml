# @package model

_target_: models.DualEncoderModel

# Architecture parameters
num_muscles: 40
pose_dim: 3

# Muscle encoder
muscle_hidden_dims: [512, 512, 512]
muscle_embed_dim: 64

# Pose encoder  
pose_hidden_dims: [512, 512, 512]
pose_embed_dim: 64

# Predictor
predictor_hidden_dims: [512, 512, 512]

# Regularization
dropout: 0.0
activation: "relu"